<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1040" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Secret Spell</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell" id="app-shell">
    <section class="spell-screen" id="spell-screen">
      <div class="spell-scene-bg" aria-hidden="true"></div>

      <div class="spell-page">
        <div class="celebration" aria-hidden="true">
          <span class="confetti">🎉</span>
          <span class="confetti">⭐</span>
          <span class="confetti">🏆</span>
          <span class="confetti">✨</span>
        </div>

        <p class="spell-badge">✨ The treasure awaits ✨</p>
        <h1>Cast the secret spell!</h1>
        <p class="spell-message">Type the magic word to unlock your prize</p>

        <div class="spell-wand" aria-hidden="true">🪄</div>

        <form class="spell-form" id="magic-word-form">
          <div class="spell-scroll" id="spell-scroll">
            <label class="visually-hidden" for="magic-word-input">Secret spell</label>
            <input
              type="text"
              id="magic-word-input"
              class="spell-input"
              autocomplete="off"
              autocapitalize="off"
              spellcheck="false"
              placeholder="Type the secret spell…"
            />
            <div class="spell-floaters" aria-hidden="true">
              <span>✨</span><span>⭐</span><span>✨</span>
            </div>
          </div>

          <p class="spell-oops" id="magic-word-error" hidden>🫣 That spell fizzled! Try again!</p>

          <button type="submit" class="cast-spell-btn" id="open-treasure-btn">
            <span>Cast the spell!</span>
            <span class="cast-spell-burst" aria-hidden="true">💫</span>
          </button>
        </form>

        <button type="button" class="play-again-btn" id="reset-btn">🔄 Play again</button>
      </div>
    </section>
  </div>

  <div class="prize-reveal" id="prize-reveal" hidden aria-hidden="true">
    <div class="prize-reveal-backdrop"></div>
    <div class="prize-reveal-rays" aria-hidden="true"></div>
    <div class="prize-confetti" id="prize-confetti" aria-hidden="true"></div>
    <div class="prize-reveal-content">
      <div class="prize-chest-wrap">
        <span class="prize-chest">🎁</span>
        <span class="prize-sparkle prize-sparkle-1">✨</span>
        <span class="prize-sparkle prize-sparkle-2">⭐</span>
        <span class="prize-sparkle prize-sparkle-3">✨</span>
        <span class="prize-sparkle prize-sparkle-4">💫</span>
      </div>
      <h2 class="prize-title">Treasure Unlocked!</h2>
      <p class="prize-subtitle">Opening your prize…</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
